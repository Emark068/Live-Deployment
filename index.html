<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominion Isoh | Developer Portfolio</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* DARK BACKGROUND */
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #4facfe, #00f2fe, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin-top: 10px;
            color: #94a3b8;
        }

        /* MAIN WRAPPER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #e2e8f0;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        /* GLASS CARDS */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* GLOW EFFECT */
        .card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(79,172,254,0.3), transparent 60%);
            transform: rotate(25deg);
            opacity: 0;
            transition: 0.4s;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #4facfe;
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.3);
        }

        /* SPECIAL TO-DO CARD */
        .highlight {
            border: 1px solid #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .highlight:hover {
            border-color: #a855f7;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }

        /* FLOATING ANIMATION BACKGROUND DOTS */
        .bg-dots {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
        }

        .bg-dots span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(79,172,254,0.4);
            border-radius: 50%;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
            }
            to {
                transform: translateY(-10vh);
            }
        }

    </style>
</head>

<body>

    <!-- FLOATING BACKGROUND -->
    <div class="bg-dots">
        <span style="left:10%; animation-duration: 12s;"></span>
        <span style="left:25%; animation-duration: 8s;"></span>
        <span style="left:40%; animation-duration: 14s;"></span>
        <span style="left:60%; animation-duration: 10s;"></span>
        <span style="left:80%; animation-duration: 9s;"></span>
    </div>

    <!-- HEADER -->
    <header>
        <h1>Mark Enimini Sunday</h1>
        <p>Creative Web Developer Portfolio</p>
    </header>

    <!-- PROJECTS -->
    <div class="container">
        <h2>My Projects</h2>

        <div class="grid">

            <a href="Lab1/lab1.html" class="card">Lab 1</a>
            <a href="Lab2/lab2.html" class="card">Lab 2</a>
            <a href="Lab3/lab3.html" class="card">Lab 3</a>
            <a href="Lab4/lab4.html" class="card">Lab 4</a>
            <a href="Lab5/lab5.html" class="card">Lab 5</a>
            <a href="Lab6/lab6.html" class="card">Lab 6</a>
            <a href="Lab7/lab7.html" class="card">Lab 7</a>

            <a href="To-do/todo.html" class="card highlight">
                To-Do App 🚀
            </a>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Mark Enimini Sunday | Built with HTML, CSS & JavaScript
    </footer>

</body>
</html>
